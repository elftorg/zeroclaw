name: build-zeroclaw-for-debian12-alwaysdata

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    defaults:
      run:
        shell: bash
    steps:
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y curl ca-certificates git build-essential pkg-config perl cmake clang

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          . "$HOME/.cargo/env"
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -Vv
          cargo -Vv

      - name: Validate required features
        run: |
          set -euo pipefail
          for f in memory-postgres sandbox-bubblewrap rag-pdf channel-lark; do
            awk -v f="$f" '
              /^\[features\]/ { in_features=1; next }
              /^\[/ && in_features { exit }
              in_features && $0 ~ "^"f"[[:space:]]*=" { found=1 }
              END { exit found ? 0 : 1 }
            ' Cargo.toml || { echo "Missing feature in Cargo.toml: $f"; exit 1; }
          done

      - name: Build (alwaysdata feature set)
        run: |
          set -euo pipefail
          . "$HOME/.cargo/env"
          FEATURES="memory-postgres,sandbox-bubblewrap,rag-pdf,channel-lark"
          echo "Building with features: $FEATURES"
          export CARGO_PROFILE_RELEASE_LTO=thin
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=8
          cargo build --release --bin zeroclaw --features "$FEATURES" 2>&1 | tee /tmp/build.log
          ls -lh target/release/zeroclaw

      - name: Strip
        run: |
          strip target/release/zeroclaw || true
          ls -lh target/release/zeroclaw

      - name: Smoke test binary
        run: |
          target/release/zeroclaw --help >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-debian12-x86_64-alwaysdata
          path: target/release/zeroclaw
