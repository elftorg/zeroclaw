name: build-zeroclaw-for-debian12

on:
  workflow_dispatch:
    inputs:
      extra_features:
        description: "Optional extra cargo features (example: rabbitmq)"
        required: false
        default: ""
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    steps:
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y curl ca-certificates git build-essential pkg-config perl cmake clang

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          . "$HOME/.cargo/env"
          rustc -Vv
          cargo -Vv

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        env:
          EXTRA_FEATURES: ${{ github.event.inputs.extra_features }}
        run: |
          . "$HOME/.cargo/env"
          FEATURES="memory-postgres"
          if [ -n "${EXTRA_FEATURES:-}" ]; then
            FEATURES="$FEATURES,${EXTRA_FEATURES}"
          fi
          echo "Building with features: $FEATURES"
          cargo build --release --locked --bin zeroclaw --features "$FEATURES"
          ls -lh target/release/zeroclaw

      - name: Strip
        run: |
          strip target/release/zeroclaw || true
          ls -lh target/release/zeroclaw

      - name: Smoke test binary
        run: |
          target/release/zeroclaw --help >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-debian12-x86_64-memory-postgres
          path: target/release/zeroclaw
