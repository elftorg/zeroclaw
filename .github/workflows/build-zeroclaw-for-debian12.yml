name: build-zeroclaw-for-debian12

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      extra_features:
        description: "Optional extra cargo features (example: rabbitmq)"
        required: false
        default: ""
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    steps:
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y curl ca-certificates git build-essential pkg-config perl cmake clang

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          . "$HOME/.cargo/env"
          RUST_VER="$(sed -n 's/^rust-version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          if [ -n "$RUST_VER" ]; then
            rustup toolchain install "$RUST_VER" --profile minimal
            rustup default "$RUST_VER"
          fi
          rustc -Vv
          cargo -Vv

      - name: Validate requested features
        env:
          EXTRA_FEATURES: ${{ github.event.inputs.extra_features }}
        run: |
          set -euo pipefail
          mapfile -t KNOWN_FEATURES < <(
            awk '
              /^\[features\]/ { in_features=1; next }
              /^\[/ && in_features { exit }
              in_features && /^[A-Za-z0-9_-]+[[:space:]]*=/ {
                split($0, a, "="); gsub(/[[:space:]]/, "", a[1]); print a[1]
              }
            ' Cargo.toml
          )
          if [ "${#KNOWN_FEATURES[@]}" -eq 0 ]; then
            echo "No [features] found in Cargo.toml"; exit 1
          fi

          check_feature() {
            local f="$1"
            for known in "${KNOWN_FEATURES[@]}"; do
              if [ "$known" = "$f" ]; then
                return 0
              fi
            done
            return 1
          }

          check_feature "memory-postgres" || { echo "Feature 'memory-postgres' not found"; exit 1; }

          if [ -n "${EXTRA_FEATURES:-}" ]; then
            IFS=',' read -ra EXTRA_ARR <<< "$EXTRA_FEATURES"
            for raw in "${EXTRA_ARR[@]}"; do
              f="$(echo "$raw" | xargs)"
              [ -z "$f" ] && continue
              if ! check_feature "$f"; then
                echo "Unknown feature requested: '$f'"
                echo "Known features: ${KNOWN_FEATURES[*]}"
                exit 1
              fi
            done
          fi

      - name: Build
        env:
          EXTRA_FEATURES: ${{ github.event.inputs.extra_features }}
        run: |
          . "$HOME/.cargo/env"
          FEATURES="memory-postgres"
          if [ -n "${EXTRA_FEATURES:-}" ]; then
            FEATURES="$FEATURES,${EXTRA_FEATURES}"
          fi
          echo "Building with features: $FEATURES"
          cargo build --release --locked --bin zeroclaw --features "$FEATURES"
          ls -lh target/release/zeroclaw

      - name: Strip
        run: |
          strip target/release/zeroclaw || true
          ls -lh target/release/zeroclaw

      - name: Smoke test binary
        run: |
          target/release/zeroclaw --help >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-debian12-x86_64-memory-postgres
          path: target/release/zeroclaw
